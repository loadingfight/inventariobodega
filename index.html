<script>

/*************************************************
 * NAVEGACION
 *************************************************/

function showTab(tabId, element) {

  // Ocultar todo
  document.querySelectorAll('.tab-content')
    .forEach(tab => tab.classList.remove('active'));

  // Quitar activo del menú
  document.querySelectorAll('.nav-link')
    .forEach(link => link.classList.remove('active'));

  // Mostrar sección seleccionada
  document.getElementById(tabId).classList.add('active');

  // Activar menú
  if (element) element.classList.add('active');

  // Guardar última pestaña
  localStorage.setItem("activeTab", tabId);
}

// Mantener pestaña activa al recargar
window.onload = function() {
  const savedTab = localStorage.getItem("activeTab") || "dashboard";
  showTab(savedTab);
};


/*************************************************
 * DASHBOARD
 *************************************************/

// Cargar ubicaciones automáticamente al abrir
    document.addEventListener("DOMContentLoaded", function(){
      cargarDashboard();
    });

    function cargarDashboard(){

      const fechaInicio = document.getElementById("fechaInicio").value;
      const fechaFin = document.getElementById("fechaFin").value;
      const ubicacion = document.getElementById("ubicacionFiltro").value;

      const btn = document.querySelector(".btn-actualizar");
      btn.disabled = true;
      btn.innerText = "Actualizando...";

      google.script.run
        .withSuccessHandler(function(res){

          document.getElementById("totalRemesas").innerText = res.totalRemesas;
          document.getElementById("remesasCompletas").innerText = res.completas;
          document.getElementById("remesasIncompletas").innerText = res.incompletas;
          document.getElementById("totalCajas").innerText = res.totalCajas;

          btn.disabled = false;
          btn.innerText = "🔄 Actualizar";
        })
        .withFailureHandler(function(){
          alert("Error actualizando dashboard");
          btn.disabled = false;
          btn.innerText = "🔄 Actualizar";
        })
        .obtenerDashboardFiltrado(fechaInicio, fechaFin, ubicacion);
    }

  


</script>
