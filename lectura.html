<!-- INVENTARIO FISICO -->
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="text-primary mb-3">
            Inventario Físico
          </h5>

          
          <!-- QR -->
          <div class="mb-3">
            <label class="form-label small">QR</label>
            <input type="text" id="qr"
                   class="form-control form-control-sm"
                   autofocus>
          </div>

          <!-- zona -->
          <div class="mb-3">
            <label class="form-label small">zona</label>
            <select id="zona"
              class="form-select form-select-sm">
              <option value="NORTE">NORTE</option>
              <option value="SUR">SUR</option>
              <option value="CENTRO">CENTRO</option>
            </select>
          </div>

          <!-- BOTÓN -->
          <div class="d-grid mb-3">
            <button class="btn btn-primary btn-sm" onclick="guardar()">
              Guardar
            </button>
          </div>

          <hr>

          <!-- AVANCE -->
          <label class="form-label small fw-bold">
            Avance de Remesa
          </label>

          <div id="mensaje" style="
            margin-top:10px;
            font-size:0.85rem;
            font-weight:500;
          "></div>

          <div class="progress">
            <div id="barra"
                 class="progress-bar bg-primary"
                 role="progressbar"
                 style="width:0%">
              0%
            </div>
          </div>

          <div id="detalle" class="mt-3 small"></div>

          <div class="mb-3">
            <label class="form-label">
              <strong>Pegar QRs + Zona</strong>
            </label>

            <textarea id="bloqueQR"
                      class="form-control"
                      rows="8"
                      placeholder="QR [Espacio o tap] ZONA"></textarea>

            <button class="btn btn-primary btn-sm mt-2"
                    id="btnProcesarBloque"
                    onclick="procesarBloque()">
              Procesar Registros
            </button>
          </div>

          <div id="resultadoCarga" class="mt-3"></div>

      <small class="text-muted d-block mt-2">
         Nota: Primero el Numero <strong>QR</strong> separado por un espacio la ubicacion en bodega.
        </small>

        </div>



        </div>
      </div>

  
  </div>

<script>

  /*************************************************
   * GUARDAR
   *************************************************/

  function guardar() {

    initAudio();

    const qr = document.getElementById("qr").value.trim();
    const zona = document.getElementById("zona").value;

    if (!qr) {
      mostrarMensaje("Debe escanear un QR", "danger");
      playError();
      return;
    }

    google.script.run
      .withSuccessHandler(respuesta)
      .guardarQR(qr, zona); 
  }

  /*************************************************
   * RESPUESTA
   *************************************************/

  function respuesta(r) {

    if (r.error) {
      mostrarMensaje(r.error, "danger");
      playError();
      return;
    }

    mostrarMensaje("Registro guardado correctamente", "success");
    playSuccess();

    const barra = document.getElementById("barra");
    barra.style.width = r.porcentaje + "%";
    barra.innerText = r.porcentaje + "%";

    if (r.porcentaje == 100) {
      barra.classList.remove("bg-primary");
      barra.classList.add("bg-success");
    }

    document.getElementById("detalle").innerHTML =
      `
      <b>Escaneados:</b> ${r.escaneados} / ${r.total}<br>
      <b>Unidades leídas:</b> ${r.unidadesEscaneadas.join(", ")}<br>
      <b>Faltan:</b> ${r.faltantes.length > 0 ? r.faltantes.join(", ") : "Ninguna"}
      `;

    document.getElementById("qr").value = "";
    document.getElementById("qr").focus();
  }



  /*************************************************
   * MENSAJE
   *************************************************/

  function mostrarMensaje(texto, tipo = "info") {

  const contenedor = document.getElementById("mensaje");
  if (!contenedor) return;

  contenedor.className = "alert alert-" + tipo;
  contenedor.innerHTML = texto;
  contenedor.style.display = "block";

  setTimeout(() => {
    contenedor.style.display = "none";
  }, 4000);
}


  /*************************************************
   * AUDIO
   *************************************************/

  let audioCtx;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }

  function playSuccess() {
    initAudio();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.12);
  }

  function playError() {
    initAudio();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(250, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.25);
  }
/*************************************************
 * CSV
 *************************************************/

function procesarBloque() {

  const texto = document.getElementById("bloqueQR").value.trim();
  const btn = document.getElementById("btnProcesarBloque");

  if (!texto) {
    mostrarResultado("Debe pegar información", "danger");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Procesando...";

  google.script.run
    .withSuccessHandler(function(res){

      mostrarResultado(
        `✅ Insertados: ${res.insertados} | ⚠️ Duplicados: ${res.duplicados} | ❌ Inválidos: ${res.invalidos}`,
        "success"
      );

      document.getElementById("bloqueQR").value = "";

      btn.disabled = false;
      btn.innerText = "Procesar Registros";

    })
    .withFailureHandler(function(err){

      mostrarResultado("Error: " + err.message, "danger");

      btn.disabled = false;
      btn.innerText = "Procesar Registros";
    })
    .procesarBloqueTexto(texto);
}

/*************************************************
 * MENSAJE
 *************************************************/

function mostrarResultado(mensaje, tipo) {

  const resultado = document.getElementById("resultadoCarga");

  const colores = {
    success: "#198754",
    danger: "#dc3545"
  };

  resultado.innerHTML = `
    <div style="
      padding:12px;
      margin-top:15px;
      border-radius:8px;
      background:${colores[tipo]};
      color:white;
      font-weight:600;
      text-align:center;
    ">
      ${mensaje}
    </div>
  `;

  setTimeout(() => {
    resultado.innerHTML = "";
  }, 5000);
}

</script>
