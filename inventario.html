<style>
    body { font-family: 'Segoe UI', sans-serif; color: #333; }
    .inventario-container { background: white; padding: 20px; border-radius: 8px; }
    .inventario-header { margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .inventario-actions { margin-bottom: 15px; }
    
    .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
    .btn-primary { background: #0d6efd; color: white; }
    .btn-warning { background: #f1c40f; color: white; }
    .btn-success { background: #27ae60; color: white; }
    
    .input-busqueda { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 4px; }

   .tabla-wrapper {
    width: 100%;
    max-height: 600px;
    overflow: auto;
    border: 1px solid #ddd;
  }

  .tabla-inventario {
    table-layout: fixed; /* Fuerza a respetar los anchos que daremos */
    width: 100%;
  }

  .tabla-inventario th, .tabla-inventario td {
    padding: 4px;
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis; /* Pone los "..." si el texto es largo */
    border: 1px solid #eee;
  }

  /* --- DEFINICIÓN DE ANCHOS POR COLUMNA --- */
  .tabla-inventario th:nth-child(1), .tabla-inventario td:nth-child(1) { width: 50px; }  /* Estado (Iconos) */
  .tabla-inventario th:nth-child(2), .tabla-inventario td:nth-child(2) { width: 100px; } /* Remesa */
  .tabla-inventario th:nth-child(3), .tabla-inventario td:nth-child(3) { width: 40px; }  /* Total */
  .tabla-inventario th:nth-child(4), .tabla-inventario td:nth-child(4) { width: 40px; }  /* Escaneadas */
  .tabla-inventario th:nth-child(5), .tabla-inventario td:nth-child(5) { width: 45px; }  /* Faltantes */
  .tabla-inventario th:nth-child(6), .tabla-inventario td:nth-child(6) { width: 50px; }  /* % */
  .tabla-inventario th:nth-child(7), .tabla-inventario td:nth-child(7) { width: 80px; }  /* Ubicación */
  .tabla-inventario th:nth-child(8), .tabla-inventario td:nth-child(8) { width: 35px; }  /* Doc */
  .tabla-inventario th:nth-child(9), .tabla-inventario td:nth-child(9) { width: 75px; }  /* FechaLec */
  
  /* CLIENTE Y DESTINO (Las más largas) */
  .tabla-inventario th:nth-child(10), .tabla-inventario td:nth-child(10) { width: 180px; } 
  .tabla-inventario th:nth-child(11), .tabla-inventario td:nth-child(11) { width: 120px; }

  /* Efecto Hover para leer nombres completos */
  .tabla-inventario td:nth-child(10):hover, 
  .tabla-inventario td:nth-child(11):hover {
    overflow: visible;
    white-space: normal;
    background: #fff !important;
    position: relative;
    z-index: 10;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
  }

  .tabla-inventario tr:nth-child(even) { background-color: #f9f9f9; }
  .tabla-inventario tr:hover { background-color: #f1f1f1; }
    .tabla-inventario tr:hover { background: #f1f7ff; }

    .loading { display: none; color: #e67e22; font-weight: bold; margin: 10px 0; }
  
  .table-alertas{
  font-size:0.75rem;
}

.table-alertas th{
  font-size:0.70rem;
  padding:4px;
}

.table-alertas td{
  padding:4px;
}

.alerta-icons{
  text-align:center;
  font-size:18px;
}


  /* Asegurar que la columna de iconos no se oculte */
  .alerta-icons {
    min-width: 40px;
    text-align: center;
    background: #f8f9fa;
    font-size: 14px;
  }
     
</style>

</head>
<body>

<div class="inventario-container">
  <div class="inventario-header">
    <h2>Control de Inventario</h2>
    <div class="inventario-actions">
      <button class="btn btn-primary" onclick="actualizarInventario()">Actualizar Inventario</button>
      <button class="btn btn-warning" onclick="mostrarAlertas()">Solo Alertas</button>
      <button class="btn btn-success" onclick="exportarStock()">Exportar CSV</button>
      <button class="btn btn-primary" onclick="iniciarCargaMasiva()" id="btnCarga">
      🚀 Iniciar Carga Masiva (API)
      </button>

      <div id="progresoContenedor" style="display:none; margin-top:10px;">
        <div style="width:100%; background:#eee; border-radius:10px; height:20px;">
          <div id="barraProgreso" style="width:0%; background:#27ae60; height:100%; border-radius:10px; transition:0.3s;"></div>
        </div>
        <small id="textoProgreso">Procesando: 0%</small>
      </div>
      
    </div>

    
    <input type="text" id="buscar" placeholder="Buscar por remesa, cliente o ubicación..." onkeyup="filtrarTabla()" class="input-busqueda">
    <p>  ✅ correcto 📦 → faltan unidades 📄 → falta documentos 📅 → muchos días </p> 
  </div>

  

  <div id="loading" class="loading">Procesando datos, por favor espere...</div>

  <div class="tabla-wrapper">
    <div id="stockTable"></div>
  </div>
</div>

<script>
  // Al cargar la página, mostrar el stock automáticamente
  window.onload = mostrarStock;


/*************************************************
 * BOTONES
 *************************************************/

  function actualizarInventario(){

    document.getElementById("loading").style.display="block";

    google.script.run
      .withSuccessHandler(function(){

        document.getElementById("loading").style.display="none";
        mostrarStock();

      })
      .actualizarInventarioCompleto();

  }

  function mostrarAlertas(){
    document.getElementById("loading").style.display="block";
    
    google.script.run
      .withSuccessHandler(function(datos){
        document.getElementById("loading").style.display="none";
        
        if(!datos || datos.length <= 1) {
          document.getElementById("stockTable").innerHTML = 
            "<div style='padding:20px; color:#e67e22; font-weight:bold;'>" +
            "✅ No se encontraron remesas con 'Muchos días'. La hoja de Alertas ha sido limpiada.</div>";
          return;
        }
        
        // Genera la tabla visual con los datos que acabamos de copiar a la hoja
        generarTabla(datos); 
      })
      .obtenerAlertasInventario();
  }

/*************************************************
 * MOSTRAR STOCK
 *************************************************/
 
  function mostrarStock(){
  document.getElementById("loading").style.display="block";
  document.getElementById("stockTable").innerHTML = ""; // Limpiamos tabla previa

  google.script.run
    .withSuccessHandler(function(datos){
      document.getElementById("loading").style.display="none";
      
     
      if(!datos || datos.length === 0){
        document.getElementById("stockTable").innerHTML="<p>No hay datos disponibles</p>";
        return;
      }
      generarTabla(datos);
    })
    .withFailureHandler(function(err){
      document.getElementById("loading").style.display="none";
      document.getElementById("stockTable").innerHTML="<p>Error: " + err.message + "</p>";
    })
    .obtenerInventarioCompleto(); 
}


/*************************************************
 * Generar Tabla
 *************************************************/

function generarTabla(datos){
  if (!datos || datos.length === 0) {
    document.getElementById("stockTable").innerHTML = "No hay datos";
    return;
  }

  const headers = datos[0];
  let html = `
  <table id="tablaInventario" class="tabla-inventario">
  <thead>
    <tr>
      <th>Estado</th>`; // Columna de iconos personalizada

  headers.forEach(col => {
    html += `<th>${col}</th>`;
  });

  html += "</tr></thead><tbody>";

  for(let i=1; i<datos.length; i++){
    const fila = datos[i];
    
    // La columna P es el índice 15 (Remesa es 0)
    const alertaTexto = String(fila[15] || "").toLowerCase().trim();

    let iconos = "";
    let claseFila = "";

    if(alertaTexto.includes("faltan unidades")) { iconos += "📦 "; claseFila = "fila-faltantes"; }
    if(alertaTexto.includes("falta documentos")) { iconos += "📄 "; claseFila = "fila-documentos"; }
    if(alertaTexto.includes("muchos dias")) { iconos += "📅 "; claseFila = "fila-dias"; }

    if(iconos === ""){
      iconos = "✅";
      claseFila = "fila-ok";
    }

    html += `<tr class="${claseFila}">`;
    html += `<td class="alerta-icons">${iconos}</td>`;

    fila.forEach((celda, index) => {
      let valor = celda === null || celda === undefined ? "" : celda;
      // Añadir atributo title para ver texto completo en columnas truncadas (Cliente/Estado)
      let tooltip = (index === 8 || index === 10) ? `title="${valor}"` : "";
      html += `<td ${tooltip}>${valor}</td>`;
    });

    html += "</tr>";
  }

  html += "</tbody></table>";
  document.getElementById("stockTable").innerHTML = html;
}

/*************************************************
 * FILTRAR Tabla
 *************************************************/


  function filtrarTabla() {
    const input = document.getElementById("buscar").value.toLowerCase();
    const filas = document.querySelectorAll("#tablaInventario tbody tr");
    filas.forEach(fila => {
      fila.style.display = fila.innerText.toLowerCase().includes(input) ? "" : "none";
    });
  }

  function exportarStock(){
    const tabla = document.getElementById("tablaInventario");
    if(!tabla) return;
    
    let csv = [];
    const filas = tabla.querySelectorAll("tr");
    
    filas.forEach(row => {
      let datosFila = [];
      const celdas = row.querySelectorAll("th, td");
      
      // Empezamos desde el índice 1 para ignorar la columna de iconos (columna 0)
      for (let i = 1; i < celdas.length; i++) {
        // Limpiamos el texto de comillas dobles para no romper el CSV y lo encerramos en comillas
        let texto = celdas[i].innerText.replace(/"/g, '""');
        datosFila.push('"' + texto + '"');
      }
      csv.push(datosFila.join(","));
    });

    const nombreArchivo = "inventario_puro_" + new Date().toLocaleDateString() + ".csv";
    const blob = new Blob([csv.join("\n")], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = nombreArchivo;
    link.click();
  }

/*************************************************
 * iniciar Carga Masiva
*************************************************/

let totalPendientes = 0;
let procesados = 0;

function iniciarCargaMasiva() {
    const btn = document.getElementById("btnCarga");
    btn.disabled = true;
    document.getElementById("progresoContenedor").style.display = "block";
    procesados = 0;
    ejecutarLote();
}

function ejecutarLote() {
    google.script.run
    .withSuccessHandler(function(resultado) {
        // resultado devuelve: { procesados: X, pendientes: Y }
        if (resultado.pendientes > 0 && resultado.procesados > 0) {
            // Actualizar barra de progreso
            procesados += resultado.procesados;
            let totalEstimado = procesados + resultado.pendientes;
            let porcentaje = Math.round((procesados / totalEstimado) * 100);
            
            document.getElementById("barraProgreso").style.width = porcentaje + "%";
            document.getElementById("textoProgreso").innerText = "Procesado: " + porcentaje + "% (" + resultado.pendientes + " restantes)";
            
            // Llamar al siguiente lote inmediatamente
            ejecutarLote();
        } else {
            // Fin del proceso
            document.getElementById("barraProgreso").style.width = "100%";
            document.getElementById("textoProgreso").innerText = "✅ ¡Carga Completa!";
            document.getElementById("btnCarga").disabled = false;
            mostrarStock(); // Refrescar la tabla
        }
    })
    .withFailureHandler(function(err) {
        alert("Error en el lote: " + err.message);
        document.getElementById("btnCarga").disabled = false;
    })
    .procesarLoteAPI(20); // Procesamos de 20 en 20 para evitar lags
}


</script>

</body>
