<div id="statsGrid" class="stats-grid"></div>


<style>

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.stat-card {
  background: #ffffff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.3s;
}

.stat-card:hover {
  transform: translateY(-4px);
}

.stat-value {
  font-size: 32px;
  font-weight: bold;
  color: #0d6efd;
}

.stat-label {
  margin-top: 8px;
  font-size: 14px;
  color: #6c757d;
}

.stat-card.warning .stat-value {
  color: #dc3545;
}

.stat-card.success .stat-value {
  color: #198754;
}

</style>


<script>

function loadDashboard() {
  google.script.run
    .withSuccessHandler(data => {
      const statsGrid = document.getElementById('statsGrid');
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${data.totalRemesas}</div>
          <div class="stat-label">Total Remesas</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.totalEscaneadas}</div>
          <div class="stat-label">Total Escaneadas</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-value">${data.conFaltantes}</div>
          <div class="stat-label">Remesas con Faltantes</div>
        </div>
        <div class="stat-card success">
          <div class="stat-value">${data.completas}</div>
          <div class="stat-label">Remesas Completas</div>
        </div>
      `;
    })
    .withFailureHandler(error => {
      alert("Error al cargar dashboard: " + error.message);
    })
    .obtenerResumenRemesas();
}

/* 🔥 Ejecutar cuando cargue */
document.addEventListener("DOMContentLoaded", loadDashboard);

</script>
